<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Snake Rush</title>
<style>
body { margin:0; overflow:hidden; background:#0f172a; }
canvas { display:block; }

#ui {
    position:absolute;
    top:20px;
    left:20px;
    color:white;
    font-family:sans-serif;
}

#nameInput {
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
}

button {
    padding:10px;
}
</style>
</head>
<body>

<div id="nameInput">
    <input id="name" placeholder="Enter your nickname">
    <button onclick="start()">Play</button>
</div>

<canvas id="game"></canvas>

<div id="ui"></div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();

let canvas = document.getElementById('game');
let ctx = canvas.getContext('2d');

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let playerId;
let players = {};
let foods = [];

let camX = 0;
let camY = 0;

let angle = 0;
let boost = false;

// 🎮 بدء اللعبة
function start(){
    let name = document.getElementById('name').value;
    socket.emit('setName', name);
    document.getElementById('nameInput').style.display = "none";
}

// 🧠 استقبال البيانات
socket.on('state', data => {
    players = data.players;
    foods = data.foods;

    if(!playerId) playerId = socket.id;
});

// 🕹️ تحكم
window.addEventListener('mousemove', e=>{
    let dx = e.clientX - canvas.width/2;
    let dy = e.clientY - canvas.height/2;
    angle = Math.atan2(dy, dx);
});

window.addEventListener('mousedown', ()=> boost = true);
window.addEventListener('mouseup', ()=> boost = false);

// 📱 موبايل
window.addEventListener('touchmove', e=>{
    let touch = e.touches[0];
    let dx = touch.clientX - canvas.width/2;
    let dy = touch.clientY - canvas.height/2;
    angle = Math.atan2(dy, dx);
});
window.addEventListener('touchstart', ()=> boost = true);
window.addEventListener('touchend', ()=> boost = false);

// 🚀 إرسال الحركة (سريع)
setInterval(()=>{
    socket.emit('move', { angle, boost });
}, 50);

// 🎨 رسم
function draw(){

    ctx.fillStyle = "#0f172a";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    let me = players[playerId];
    if(me){
        camX = me.x - canvas.width/2;
        camY = me.y - canvas.height/2;
    }

    // 🔴 حدود حمراء
    ctx.strokeStyle = "red";
    ctx.lineWidth = 5;
    ctx.strokeRect(-camX, -camY, 3000, 3000);

    // 🍎 الأكل
    ctx.fillStyle = "yellow";
    foods.forEach(f=>{
        ctx.beginPath();
        ctx.arc(f.x - camX, f.y - camY, 3, 0, Math.PI*2);
        ctx.fill();
    });

    // 🐍 اللاعبين
    for(let id in players){
        let p = players[id];

        ctx.fillStyle = (id === playerId) ? "#22c55e" : "#38bdf8";

        p.body.forEach(part=>{
            ctx.beginPath();
            ctx.arc(part.x - camX, part.y - camY, 5, 0, Math.PI*2);
            ctx.fill();
        });

        ctx.fillStyle = "white";
        ctx.fillText(p.name, p.x - camX - 10, p.y - camY - 10);
    }

    requestAnimationFrame(draw);
}

draw();
</script>

</body>
</html>
